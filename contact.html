<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact ASJK</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">ASJK</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact-section animate-fade-up">
      <h2>Get in Touch</h2>
      <!-- IMPORTANT: Replace YOUR-FORM-ID with your real Formspree endpoint ID -->
      <form action="https://formspree.io/f/xgojdgld" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="problem">Your Problem</label>
          <textarea id="problem" name="problem" rows="5" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2025 ASJK. All rights reserved.</p>
  </footer>
</body>
</html>
